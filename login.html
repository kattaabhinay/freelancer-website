<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">Freelancer App</span>
  </div>
</nav>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">

      <div class="card p-4 shadow">
        <h3 class="text-center">Login</h3>

        <input id="email" class="form-control mt-3" placeholder="Email">
        <input id="password" type="password" class="form-control mt-3" placeholder="Password">

        <button class="btn btn-primary mt-3" onclick="login()">Login</button>

      </div>

    </div>
  </div>
</div>

<script src="../js/script.js"></script>

</body>
</html>
