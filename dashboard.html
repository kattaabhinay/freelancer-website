<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">Freelancer Dashboard</span>
  </div>
</nav>

<div class="container mt-4">

    <!-- STATS -->
    <div class="row">
        <div class="col-md-4">
            <div class="dashboard-box bg-primary-custom">
                Total Jobs
                <h3 id="totalJobs">0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="dashboard-box bg-success-custom">
                Total Budget
                <h3 id="totalBudget">0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="dashboard-box bg-warning-custom">
                Avg Budget
                <h3 id="avgBudget">0</h3>
            </div>
        </div>
    </div>

    <hr>

    <!-- JOB FORM -->
    <h3>Post Job</h3>

    <input id="title" placeholder="Job Title" class="form-control mb-2">
    <input id="desc" placeholder="Description" class="form-control mb-2">
    <input id="budget" placeholder="Budget" class="form-control mb-2">

    <button onclick="createJob()" class="btn btn-primary">Post Job</button>

    <hr>

    <!-- JOB LIST -->
    <h3>Job List</h3>
    <div id="jobs"></div>

    <hr>

    <!-- GRAPH -->
    <h3>Job Budget Graph</h3>
    <canvas id="jobChart"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../js/script.js"></script>

</body>
</html>
<input id="search" placeholder="Search jobs..." 
onkeyup="searchJobs()" 
class="form-control mb-3">
<h3>Chat</h3>

<input id="receiverId" placeholder="Receiver ID" class="form-control mb-2">
<input id="msg" placeholder="Message" class="form-control mb-2">

<button onclick="sendMessage()" class="btn btn-primary">Send</button>

<div id="chatBox"></div>
<hr>

<h3>Chat System</h3>

<input id="receiverId" placeholder="Enter Receiver ID" class="form-control mb-2">

<input id="msg" placeholder="Enter Message" class="form-control mb-2">

<button onclick="sendMessage()" class="btn btn-primary">
Send Message
</button>

<button onclick="loadMessages()" class="btn btn-secondary mt-2">
Load Chat
</button>

<div id="chatBox" class="mt-3"></div>
